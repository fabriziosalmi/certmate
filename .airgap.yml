# AGSSH-STD-001 conformance declaration (the fleet runner reads this; §12).
target_profile: Bronze
level: L2                       # the app monitors arbitrary external domains by function,
                                # so AG-NET-04 (connect-src) is CONDITIONAL at L2, not a deviation
surfaces:
  - url: https://www.certmate.org/
    kind: site
    stateless: false            # Flask app: XFO / CSP / HSTS are header-delivered by the app
backend: cloudflare             # proxied origin -> Transform Rules add the header set to the
                                # static surfaces that GitHub-Pages-via-Cloudflare serves header-less (§11)
dns:
  zone: certmate.org            # checked for CAA / DNSSEC / dangling CNAME
deviations: []                  # MUSTs are NEVER waivable (AG-GOV-01)

