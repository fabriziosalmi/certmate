{% extends "base.html" %}
{% block title %}CertMate - Activity{% endblock %}
{% block content %}
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <div class="bg-surface shadow-card rounded-xl overflow-hidden">
            <div class="px-6 py-3 border-b border-gray-100 dark:border-white/5">
                <div class="flex items-center justify-between">
                    <nav class="flex items-center text-sm" aria-label="Breadcrumb">
                        <a href="/" aria-label="Home" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors"><i class="fas fa-home"></i></a>
                        <i class="fas fa-chevron-right text-[10px] text-gray-300 dark:text-gray-600 mx-2"></i>
                        <span class="text-gray-700 dark:text-gray-200 font-medium">Activity</span>
                    </nav>
                    <div class="flex items-center gap-2 flex-wrap">
                        <input type="search" id="filterSearch" aria-label="Search activity log"
                               placeholder="Search domain, resource, user…"
                               class="px-3 py-1.5 text-xs border text-foreground border-border rounded-lg bg-input placeholder-gray-400 focus:ring-2 focus:ring-primary w-44 sm:w-56">
                        <select id="filterDate" aria-label="Filter by date range" class="px-3 py-1.5 text-xs border text-foreground border-border rounded-lg bg-input focus:ring-2 focus:ring-primary">
                            <option value="">All time</option>
                            <option value="today">Today</option>
                            <option value="7d">Last 7 days</option>
                            <option value="30d">Last 30 days</option>
                        </select>
                        <select id="filterOp" aria-label="Filter by operation type" class="px-3 py-1.5 text-xs border text-foreground border-border rounded-lg bg-input focus:ring-2 focus:ring-primary">
                            <option value="">All operations</option>
                            <option value="create">Created</option>
                            <option value="update">Updated</option>
                            <option value="renew">Renewed</option>
                            <option value="deploy">Deployed</option>
                            <option value="revoke">Revoked</option>
                            <option value="download">Downloaded</option>
                            <option value="api_request">API requests only</option>
                        </select>
                        <button type="button" onclick="loadActivity()" class="px-2.5 py-1.5 text-xs bg-surface-2 text-muted rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition" title="Refresh" aria-label="Refresh activity log">
                            <i class="fas fa-sync"></i>
                        </button>
                    </div>
                </div>
            </div>
            <ul id="activityList" role="feed" aria-busy="false" aria-label="Activity log"
                class="divide-y divide-gray-100 dark:divide-gray-700/50 list-none m-0 p-0">
                <!-- Skeleton rows; replaced by JS once /api/activity responds. -->
            </ul>
        </div>
    </div>

    <!-- Activity entry detail modal — opened by clicking any row. Populated by
         openDetail() with the full audit entry (metadata, error, command
         output for deploy hooks, raw details JSON) plus contextual actions. -->
    <div id="activityDetailModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4" onclick="if (event.target===this) closeDetail()" role="dialog" aria-modal="true" aria-labelledby="activityDetailTitle">
        <div class="bg-surface text-foreground border border-border rounded-xl shadow-2xl w-full max-w-2xl" style="max-height: 85vh; display: grid; grid-template-rows: auto minmax(0, 1fr) auto;" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between px-5 py-4 border-b border-border">
                <div class="flex items-center gap-3 min-w-0">
                    <div id="activityDetailIcon" class="w-9 h-9 rounded-full bg-surface-2 flex items-center justify-center flex-shrink-0"><i class="fas fa-circle text-muted text-sm"></i></div>
                    <div class="min-w-0">
                        <h2 id="activityDetailTitle" class="text-sm font-semibold truncate">Activity detail</h2>
                        <p id="activityDetailSub" class="text-xs text-muted truncate"></p>
                    </div>
                </div>
                <button type="button" onclick="closeDetail()" aria-label="Close" class="text-muted hover:text-foreground transition text-xl leading-none flex-shrink-0">&times;</button>
            </div>
            <div id="activityDetailBody" class="px-5 py-4 space-y-4 overflow-y-auto" style="min-height:0;"></div>
            <div id="activityDetailActions" class="flex items-center justify-end gap-2 px-5 py-3 border-t border-border flex-wrap"></div>
        </div>
    </div>

    <script>
    (function() {
        var escapeHtml = CertMate.escapeHtml;
        // Entries currently rendered (post-filter); the detail modal reads
        // _rendered[index] off each row's data-entry-index. _lastFocus restores
        // focus to the triggering row when the modal closes.
        var _rendered = [];
        var _lastFocus = null;

        // Page-state for incremental Load-more pagination. The backend
        // caps `?limit=` at 500, so once we hit that the button hides.
        var ACTIVITY_INITIAL_LIMIT = 100;
        var ACTIVITY_MAX_LIMIT = 500;
        var currentLimit = ACTIVITY_INITIAL_LIMIT;

        // Coherent glyph+colour semantics per operation FAMILY so the icon
        // column triages at a glance instead of a wall of identical grey discs:
        // green=create, blue=update, cyan=renew, red=delete/revoke,
        // purple=deploy, indigo=download, teal=restore, amber=auto-renew/test,
        // slate/grey=maintenance/read/API. Unknown ops fall back to a grey circle.
        var opIcons = {
            // create (green)
            create:              { icon: 'fa-plus-circle',       color: 'text-green-500',  bg: 'bg-success-surface' },
            create_account:      { icon: 'fa-user-plus',         color: 'text-green-500',  bg: 'bg-success-surface' },
            batch_create:        { icon: 'fa-layer-group',       color: 'text-green-500',  bg: 'bg-success-surface' },
            oidc_login_success:  { icon: 'fa-right-to-bracket',  color: 'text-green-500',  bg: 'bg-success-surface' },
            // update (blue)
            update:              { icon: 'fa-pen',               color: 'text-blue-500',   bg: 'bg-info-surface' },
            update_config:       { icon: 'fa-sliders',           color: 'text-blue-500',   bg: 'bg-info-surface' },
            update_account:      { icon: 'fa-user-pen',          color: 'text-blue-500',   bg: 'bg-info-surface' },
            oidc_config_changed: { icon: 'fa-id-badge',          color: 'text-blue-500',   bg: 'bg-info-surface' },
            // renew (cyan) / auto-renew (amber)
            renew:               { icon: 'fa-arrows-rotate',     color: 'text-cyan-500',   bg: 'bg-cyan-100 dark:bg-cyan-900/30' },
            set_auto_renew:      { icon: 'fa-clock-rotate-left', color: 'text-amber-500',  bg: 'bg-warning-surface' },
            // delete / revoke (red)
            revoke:              { icon: 'fa-ban',               color: 'text-red-500',    bg: 'bg-danger-surface' },
            delete:              { icon: 'fa-trash-can',         color: 'text-red-500',    bg: 'bg-danger-surface' },
            delete_account:      { icon: 'fa-user-minus',        color: 'text-red-500',    bg: 'bg-danger-surface' },
            clear:               { icon: 'fa-eraser',            color: 'text-red-500',    bg: 'bg-danger-surface' },
            oidc_login_failure:  { icon: 'fa-right-to-bracket',  color: 'text-red-500',    bg: 'bg-danger-surface' },
            // deploy (purple)
            deploy:              { icon: 'fa-rocket',            color: 'text-purple-500', bg: 'bg-purple-100 dark:bg-purple-900/30' },
            deploy_hook:         { icon: 'fa-bolt',              color: 'text-purple-500', bg: 'bg-purple-100 dark:bg-purple-900/30' },
            // download (indigo)
            download:            { icon: 'fa-download',          color: 'text-indigo-500', bg: 'bg-indigo-100 dark:bg-indigo-900/30' },
            batch_download:      { icon: 'fa-file-zipper',       color: 'text-indigo-500', bg: 'bg-indigo-100 dark:bg-indigo-900/30' },
            // restore / maintenance (teal / slate)
            restore:             { icon: 'fa-clock-rotate-left', color: 'text-teal-500',   bg: 'bg-teal-100 dark:bg-teal-900/30' },
            backfill:            { icon: 'fa-database',          color: 'text-slate-500',  bg: 'bg-surface-2' },
            migrate:             { icon: 'fa-arrow-right-arrow-left', color: 'text-slate-500', bg: 'bg-surface-2' },
            // read / API / test
            access:              { icon: 'fa-eye',               color: 'text-gray-500',   bg: 'bg-surface-2' },
            api_request:         { icon: 'fa-code',              color: 'text-gray-500',   bg: 'bg-surface-2' },
            test:                { icon: 'fa-vial',              color: 'text-amber-500',  bg: 'bg-warning-surface' },
            failure:             { icon: 'fa-exclamation-circle', color: 'text-red-500',   bg: 'bg-danger-surface' }
        };

        function getOpStyle(entry) {
            if (entry.status === 'failure') return opIcons.failure;
            return opIcons[entry.operation] || { icon: 'fa-circle', color: 'text-gray-400', bg: 'bg-surface-2' };
        }

        function formatTime(ts) {
            try {
                var d = new Date(ts);
                var now = new Date();
                var diff = (now - d) / 1000;
                if (diff < 60) return 'just now';
                if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
                if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
                if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
                return d.toLocaleDateString();
            } catch (e) { return ts; }
        }

        // Absolute timestamp for the tooltip — exposes the exact moment a
        // relative label like "5h ago" or "2d ago" stands for. Uses the
        // browser locale so users see the format they're used to ("May 12,
        // 2026, 3:45:12 PM" / "12 maggio 2026, 15:45:12"). Falls back to
        // the raw upstream string if the value isn't a parseable date.
        // Guards against `null` (which would otherwise resolve to the
        // 1970 epoch via new Date(null)).
        function absoluteTime(ts) {
            try {
                if (ts === null || ts === undefined || ts === '') return '';
                var d = new Date(ts);
                if (isNaN(d.getTime())) return String(ts);
                return d.toLocaleString(undefined, {
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
            } catch (e) { return String(ts || ''); }
        }

        // Compact absolute timestamp (no year/seconds) shown inline on each
        // row so the exact moment is reachable on touch, where the title
        // tooltip on the relative label never fires.
        function compactTime(ts) {
            try {
                if (!ts) return '';
                var d = new Date(ts);
                if (isNaN(d.getTime())) return '';
                return d.toLocaleString(undefined, {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
            } catch (e) { return ''; }
        }

        function opLabel(entry) {
            var labels = {
                create: 'Created',
                renew: 'Renewed',
                revoke: 'Revoked',
                download: 'Downloaded',
                api_request: 'API call',
                batch_create: 'Batch created',
                batch_download: 'Batch downloaded',
                create_account: 'Account added',
                update_account: 'Account updated',
                delete_account: 'Account removed',
                update_config: 'Config updated',
                set_auto_renew: 'Auto-renew changed',
                deploy: 'Deployed',
                deploy_hook: 'Deploy hook ran',
                update: 'Updated',
                delete: 'Deleted',
                restore: 'Restored'
            };
            // Humanize any unmapped operation rather than leaking the raw
            // snake_case identifier (e.g. 'oidc_config_changed' -> 'Oidc
            // Config Changed') so the headline is never developer jargon.
            return labels[entry.operation] || String(entry.operation || '')
                .replace(/_/g, ' ')
                .replace(/\b\w/g, function(c) { return c.toUpperCase(); });
        }

        // Render a status-aware error state so the user knows *why* the
        // log didn't load. The previous catch-all "Failed to load
        // activity" hid the difference between an expired session
        // (actionable: re-login), a missing route (actionable: report),
        // a server error (actionable: retry), and a true network outage.
        function renderErrorState(status, rawErr) {
            var msg, hint;
            if (status === 401) {
                msg = 'Authentication required';
                hint = '<a href="/login" class="text-primary hover:underline">Sign in</a> to view the activity log.';
            } else if (status === 403) {
                msg = 'You don’t have permission to view the activity log.';
                hint = 'Ask an admin to grant you a role with audit access.';
            } else if (status === 404) {
                msg = 'Activity endpoint not found';
                hint = 'The /api/activity route is unavailable on this build. Check the server logs or report this on GitHub.';
            } else if (status && status >= 500 && status <= 599) {
                msg = 'Server error (HTTP ' + status + ')';
                hint = 'Try refreshing in a moment, or check the server logs.';
            } else {
                // Network error, CORS error, JSON parse error — all surface
                // here without a `status` because fetch never resolved.
                msg = 'Cannot reach the activity service';
                hint = 'Check your network connection and try the Refresh button.';
            }
            console.error('Error loading activity:', status || 'no-status', rawErr);
            var list = document.getElementById('activityList');
            list.setAttribute('aria-busy', 'false');
            list.innerHTML =
                '<li role="alert" class="px-6 py-10 text-center">' +
                    '<i class="fas fa-exclamation-circle text-red-400 text-2xl mb-3 block"></i>' +
                    '<div class="text-sm font-medium text-gray-700 dark:text-gray-200">' + escapeHtml(msg) + '</div>' +
                    '<p class="mt-2 text-xs text-muted">' + hint + '</p>' +
                '</li>';
        }

        // Build a single lowercase search blob per entry. Operation labels
        // ("Created", "Renewed") are translated through opLabel so a user
        // searching "renew" still matches `entry.operation === 'renew'`.
        // The detail fields are joined to catch domain matches buried in
        // common_name or method. Status and error strings are folded in
        // for searches like "failed" or "404".
        function entrySearchBlob(entry) {
            var parts = [
                entry.resource_type, entry.resource_id, entry.user,
                entry.operation, opLabel(entry), entry.status, entry.error,
            ];
            var d = entry.details || {};
            for (var k in d) {
                if (Object.prototype.hasOwnProperty.call(d, k)) {
                    parts.push(String(d[k]));
                }
            }
            return parts.filter(Boolean).join(' ').toLowerCase();
        }

        function passesSearchFilter(entry, term) {
            if (!term) return true;
            return entrySearchBlob(entry).indexOf(term) !== -1;
        }

        // Skeleton rows shown both at first paint and during any refetch.
        // Shape matches the real entry layout (icon disc on the left, two
        // text lines in the middle, two-line meta on the right) so the
        // page doesn't visually jump when the response lands. Uses the
        // existing `.skeleton` class from input.css/tailwind.min.css which
        // already carries the shimmer animation and dark-mode variant.
        function skeletonRowsHtml(count) {
            var widths = ['w-20', 'w-28', 'w-24', 'w-32', 'w-20', 'w-28'];
            var subWidths = ['w-3/4', 'w-2/3', 'w-1/2', 'w-3/4', 'w-2/3', 'w-1/2'];
            var rows = [];
            for (var i = 0; i < count; i++) {
                rows.push(
                    // role="article" satisfies the role="feed" contract on
                    // the parent <ul>; aria-hidden hides the placeholder
                    // from screen readers until the real entry lands.
                    '<li role="article" aria-hidden="true" class="flex items-start gap-4 px-4 sm:px-6 py-4">' +
                        '<div class="flex-shrink-0 mt-0.5">' +
                            '<div class="skeleton w-9 h-9 rounded-full"></div>' +
                        '</div>' +
                        '<div class="flex-1 min-w-0 space-y-2">' +
                            '<div class="skeleton h-4 ' + widths[i % widths.length] + '"></div>' +
                            '<div class="skeleton h-3 ' + subWidths[i % subWidths.length] + '"></div>' +
                        '</div>' +
                        '<div class="flex-shrink-0 space-y-2">' +
                            '<div class="skeleton h-3 w-12 ml-auto"></div>' +
                            '<div class="skeleton h-3 w-16 ml-auto"></div>' +
                        '</div>' +
                    '</li>'
                );
            }
            return rows.join('');
        }

        // Date-range filtering happens client-side on the already-fetched
        // window of entries. Returning false drops the entry. "today" is
        // calendar-day, not a rolling 24h window — matches what users mean
        // when they say "what happened today". 7d/30d are rolling windows
        // ending now (the upstream `?limit=100` cap can still mask older
        // entries; a paginated fetch is a separate fix).
        function passesDateFilter(entry, range) {
            if (!range) return true;
            var t = new Date(entry.timestamp);
            if (isNaN(t.getTime())) return true; // can't filter what we can't parse
            var now = new Date();
            if (range === 'today') {
                return t.getFullYear() === now.getFullYear()
                    && t.getMonth() === now.getMonth()
                    && t.getDate() === now.getDate();
            }
            var days = range === '7d' ? 7 : range === '30d' ? 30 : 0;
            if (!days) return true;
            var cutoff = now.getTime() - days * 86400000;
            return t.getTime() >= cutoff;
        }

        window.loadActivity = function() {
            var opFilter = document.getElementById('filterOp').value;
            var dateFilter = document.getElementById('filterDate').value;
            var searchTerm = (document.getElementById('filterSearch').value || '').trim().toLowerCase();
            // Show skeleton placeholders during the request. On a fast
            // network this barely flashes; on a slow one the user has a
            // concrete "something is happening" signal instead of stale
            // content. aria-busy lets assistive tech defer the new
            // content announcement until the real entries land.
            var listEl = document.getElementById('activityList');
            listEl.setAttribute('aria-busy', 'true');
            listEl.innerHTML = skeletonRowsHtml(6);
            fetch('/api/activity?limit=' + currentLimit, { credentials: 'same-origin' })
                .then(function(r) {
                    if (!r.ok) {
                        var err = new Error('HTTP ' + r.status);
                        err.status = r.status;
                        throw err;
                    }
                    return r.json();
                })
                .then(function(data) {
                    var entries = data.entries || [];
                    var rawCount = entries.length;
                    // The backend caps at `data.limit`; if it gave us
                    // exactly that many, there may be more upstream — show
                    // the Load-more button. Hide it once we're at the
                    // hard ceiling.
                    var hasMore = rawCount >= currentLimit && currentLimit < ACTIVITY_MAX_LIMIT;
                    if (opFilter) {
                        // Match the operation FAMILY, not just the exact value:
                        // "Created" must catch create_account and batch_create,
                        // "Updated" must catch update_config/update_account, etc.
                        // The '_' boundary keeps "renew" from matching
                        // set_auto_renew (toggling auto-renew is not a renewal).
                        entries = entries.filter(function(e) {
                            return e.operation === opFilter
                                || e.operation.indexOf(opFilter + '_') === 0
                                || e.operation === 'batch_' + opFilter;
                        });
                    } else {
                        // Default view hides api_request entries: those are
                        // technical audit rows (HTTP method, status code)
                        // more useful as a dedicated audit log than mixed in
                        // with user-driven actions. The user opts in via the
                        // "API requests only" filter.
                        entries = entries.filter(function(e) { return e.operation !== 'api_request'; });
                    }
                    if (dateFilter) {
                        entries = entries.filter(function(e) { return passesDateFilter(e, dateFilter); });
                    }
                    if (searchTerm) {
                        entries = entries.filter(function(e) { return passesSearchFilter(e, searchTerm); });
                    }
                    renderEntries(entries, hasMore);
                })
                .catch(function(err) {
                    renderErrorState(err && err.status, err);
                });
        };

        function renderEntries(entries, hasMore) {
            var list = document.getElementById('activityList');
            list.setAttribute('aria-busy', 'false');
            if (entries.length === 0) {
                // Distinguish "nothing matches your filters" from "the log is
                // genuinely empty" — the old copy claimed the latter even when
                // a filter simply excluded everything.
                var anyFilter = document.getElementById('filterOp').value ||
                                document.getElementById('filterDate').value ||
                                (document.getElementById('filterSearch').value || '').trim();
                var emptyMsg = anyFilter ? 'No activity matches the current filters' : 'No activity recorded yet';
                list.innerHTML = '<li role="presentation" class="px-6 py-12 flex flex-col items-center gap-3 text-muted">' +
                    '<i class="fas fa-inbox text-3xl text-gray-300 dark:text-gray-600" aria-hidden="true"></i>' +
                    '<p>' + emptyMsg + '</p>' +
                    (anyFilter ? '<button type="button" onclick="clearActivityFilters()" class="text-xs text-primary hover:underline">Clear filters</button>' : '') +
                '</li>';
                return;
            }

            _rendered = entries;
            list.innerHTML = entries.map(function(entry, idx) {
                var style = getOpStyle(entry);
                var details = entry.details || {};
                var detailParts = [];
                if (details.common_name) detailParts.push('CN: ' + details.common_name);
                if (details.usage) detailParts.push(details.usage);
                if (details.file_type) detailParts.push('.' + details.file_type);
                if (details.reason) detailParts.push('Reason: ' + details.reason);
                if (details.method) detailParts.push(details.method);
                if (details.status_code) detailParts.push('HTTP ' + details.status_code);
                var detailStr = detailParts.length > 0 ? detailParts.join(' · ') : '';

                // Every row opens the detail modal (openDetail) regardless of
                // resource type — the modal carries the cert deep-link, the
                // command output, and the raw entry, so no row is a dead end.
                // role=button + tabindex make it keyboard-operable; the
                // aria-label gives screen readers a one-line summary
                // ("Renewed — certificate foo.example.com, 2h ago. Activate for details.").
                var ariaLabel = opLabel(entry) +
                    (entry.status === 'failure' ? ' (failed)' : '') +
                    ' — ' + (entry.resource_type || '') +
                    (entry.resource_id ? ' ' + entry.resource_id : '') +
                    ', ' + formatTime(entry.timestamp) + '. Activate for details.';

                // Humanize resource_type (raw snake_case otherwise) and drop a
                // resource_id that merely repeats the type ("settings: settings").
                var rTypeLabel = String(entry.resource_type || '')
                    .replace(/_/g, ' ')
                    .replace(/\b\w/g, function(c) { return c.toUpperCase(); });
                var showResourceId = entry.resource_id && entry.resource_id !== entry.resource_type;
                var resourceHtml = escapeHtml(rTypeLabel) +
                    (showResourceId ? ': <strong>' + escapeHtml(entry.resource_id) + '</strong>' : '');

                return '<li role="article">' +
                    '<div role="button" tabindex="0" data-entry-index="' + idx + '" aria-label="' + escapeHtml(ariaLabel) + '"' +
                        ' class="flex items-start gap-4 px-4 sm:px-6 py-4 hover:bg-gray-50 dark:hover:bg-gray-700/30 transition cursor-pointer focus:outline-none focus:ring-2 focus:ring-inset focus:ring-primary">' +
                        '<div class="flex-shrink-0 mt-0.5">' +
                            '<div class="w-9 h-9 rounded-full ' + style.bg + ' flex items-center justify-center">' +
                                '<i class="fas ' + style.icon + ' ' + style.color + ' text-sm"></i>' +
                            '</div>' +
                        '</div>' +
                        '<div class="flex-1 min-w-0">' +
                            '<div class="flex items-center gap-2">' +
                                '<span class="text-sm font-medium text-foreground">' + escapeHtml(opLabel(entry)) + '</span>' +
                                (entry.status === 'failure' ? '<span class="px-1.5 py-0.5 text-[10px] font-medium bg-danger-surface text-danger-fg rounded">FAILED</span>' : '') +
                            '</div>' +
                            '<p class="text-sm text-muted truncate">' + resourceHtml + '</p>' +
                            (detailStr ? '<p class="text-xs text-gray-400 mt-0.5 truncate">' + escapeHtml(detailStr) + '</p>' : '') +
                            (entry.error ? '<p class="text-xs text-red-500 mt-0.5 truncate"><i class="fas fa-triangle-exclamation mr-1"></i>' + escapeHtml(entry.error) + '</p>' : '') +
                        '</div>' +
                        '<div class="flex-shrink-0 text-right">' +
                            '<div class="text-xs text-gray-400" title="' + escapeHtml(absoluteTime(entry.timestamp)) + '">' + escapeHtml(formatTime(entry.timestamp)) + '</div>' +
                            '<div class="text-[10px] text-muted mt-0.5">' + escapeHtml(compactTime(entry.timestamp)) + '</div>' +
                            '<div class="text-[10px] text-gray-400 mt-1">' + escapeHtml(entry.user || 'system') + '</div>' +
                            '<i class="fas fa-chevron-right text-[10px] text-gray-300 dark:text-gray-600 mt-1" aria-hidden="true"></i>' +
                        '</div>' +
                    '</div>' +
                '</li>';
            }).join('');

            // Wire row activation (click / Enter / Space) to the detail modal.
            list.querySelectorAll('[data-entry-index]').forEach(function(el) {
                el.addEventListener('click', function() { openDetail(parseInt(el.getAttribute('data-entry-index'), 10)); });
                el.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDetail(parseInt(el.getAttribute('data-entry-index'), 10)); }
                });
            });

            if (hasMore) {
                // Wrap the control row in <li role="presentation"> so it
                // is valid markup under <ul> but isn't announced as a
                // feed article.
                var btnHtml = '<li role="presentation" class="px-6 py-4 text-center border-t border-gray-100 dark:border-gray-700/50">' +
                    '<button id="loadMoreActivity" type="button" class="inline-flex items-center px-4 py-1.5 text-xs border border-border rounded-lg bg-input text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600 transition">' +
                        '<i class="fas fa-plus mr-2"></i>Load more' +
                    '</button>' +
                '</li>';
                list.insertAdjacentHTML('beforeend', btnHtml);
                document.getElementById('loadMoreActivity').addEventListener('click', function() {
                    currentLimit = Math.min(currentLimit + ACTIVITY_INITIAL_LIMIT, ACTIVITY_MAX_LIMIT);
                    loadActivity();
                });
            }
        }

        function kvRow(label, value, mono) {
            if (value === null || value === undefined || value === '') return '';
            return '<div class="flex gap-3 py-1.5 border-b border-gray-100 dark:border-gray-700/40 last:border-0">' +
                '<div class="w-32 flex-shrink-0 text-xs uppercase tracking-wide text-gray-400 dark:text-gray-500 pt-0.5">' + escapeHtml(label) + '</div>' +
                '<div class="flex-1 min-w-0 text-sm ' + (mono ? 'font-mono break-all' : 'break-words') + '">' + escapeHtml(String(value)) + '</div>' +
            '</div>';
        }

        window.openDetail = function(idx) {
            var entry = _rendered[idx];
            if (!entry) return;
            var style = getOpStyle(entry);
            var details = entry.details || {};
            var actor = entry.actor || {};
            var trigger = entry.trigger || {};

            var iconEl = document.getElementById('activityDetailIcon');
            iconEl.className = 'w-9 h-9 rounded-full ' + style.bg + ' flex items-center justify-center flex-shrink-0';
            iconEl.innerHTML = '<i class="fas ' + style.icon + ' ' + style.color + ' text-sm"></i>';
            document.getElementById('activityDetailTitle').textContent = opLabel(entry) + (entry.status === 'failure' ? ' (failed)' : '');
            document.getElementById('activityDetailSub').textContent = (entry.resource_type || '') + (entry.resource_id ? ' · ' + entry.resource_id : '');

            var body = '<div>' +
                kvRow('When', absoluteTime(entry.timestamp)) +
                kvRow('Operation', opLabel(entry) + ' (' + entry.operation + ')') +
                kvRow('Status', entry.status) +
                kvRow('Resource', (entry.resource_type || '') + (entry.resource_id ? ': ' + entry.resource_id : '')) +
                kvRow('User', entry.user) +
                kvRow('IP address', entry.ip_address, true) +
                kvRow('Actor', actor.label ? actor.label + (actor.kind ? ' (' + actor.kind + ')' : '') : '') +
                kvRow('Trigger', trigger.cause) +
                kvRow('Sequence', (entry.seq !== undefined && entry.seq !== null) ? '#' + entry.seq : '') +
            '</div>';

            if (entry.error) {
                body += '<div class="rounded-lg bg-danger-surface border border-danger-line p-3">' +
                    '<div class="text-[10px] uppercase tracking-wide text-danger-fg mb-1">Error</div>' +
                    '<div class="text-sm text-danger-fg break-words">' + escapeHtml(entry.error) + '</div>' +
                '</div>';
            }

            // Command output (deploy hooks): exit code + std streams.
            var out = '';
            if (details.exit_code !== undefined && details.exit_code !== null) {
                out += '<div class="text-xs"><span class="text-gray-400">Exit code:</span> <span class="font-mono">' + escapeHtml(String(details.exit_code)) + '</span></div>';
            }
            if (details.stderr) {
                out += '<div><div class="text-[10px] uppercase tracking-wide text-gray-400 mb-1">stderr</div><pre class="font-mono text-xs bg-gray-900 text-gray-100 rounded p-2 whitespace-pre-wrap break-words max-h-48 overflow-y-auto">' + escapeHtml(details.stderr) + '</pre></div>';
            }
            if (details.stdout) {
                out += '<div><div class="text-[10px] uppercase tracking-wide text-gray-400 mb-1">stdout</div><pre class="font-mono text-xs bg-gray-900 text-gray-100 rounded p-2 whitespace-pre-wrap break-words max-h-48 overflow-y-auto">' + escapeHtml(details.stdout) + '</pre></div>';
            }
            if (out) body += '<div class="space-y-2">' + out + '</div>';

            // Remaining details (everything except the streams shown above).
            var shown = { exit_code: 1, stderr: 1, stdout: 1 };
            var rest = {};
            Object.keys(details).forEach(function(k) { if (!shown[k]) rest[k] = details[k]; });
            if (Object.keys(rest).length) {
                body += '<div><div class="text-[10px] uppercase tracking-wide text-gray-400 mb-1">Details</div>' +
                    '<pre class="font-mono text-xs bg-surface-2 rounded p-2 whitespace-pre-wrap break-words max-h-48 overflow-y-auto">' + escapeHtml(JSON.stringify(rest, null, 2)) + '</pre></div>';
            }

            document.getElementById('activityDetailBody').innerHTML = body;

            // Contextual actions.
            var btnCls = 'inline-flex items-center px-3 py-1.5 text-xs border border-border rounded-lg bg-input text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600 transition';
            var actions = '';
            if (entry.resource_type === 'certificate' && entry.resource_id) {
                actions += '<a href="/?cert=' + encodeURIComponent(entry.resource_id) + '" class="' + btnCls + '"><i class="fas fa-arrow-up-right-from-square mr-1.5 text-[10px]"></i>View certificate</a>';
            }
            if (entry.user) {
                actions += '<button type="button" data-detail-filter="user" data-value="' + escapeHtml(entry.user) + '" class="' + btnCls + '"><i class="fas fa-user mr-1.5 text-[10px]"></i>Filter by user</button>';
            }
            if (entry.operation) {
                actions += '<button type="button" data-detail-filter="op" data-value="' + escapeHtml(entry.operation) + '" class="' + btnCls + '"><i class="fas fa-filter mr-1.5 text-[10px]"></i>Filter by operation</button>';
            }
            actions += '<button type="button" data-detail-copy class="' + btnCls + '"><i class="fas fa-copy mr-1.5 text-[10px]"></i>Copy JSON</button>';
            var actionsEl = document.getElementById('activityDetailActions');
            actionsEl.innerHTML = actions;
            actionsEl.querySelectorAll('[data-detail-filter]').forEach(function(b) {
                b.addEventListener('click', function() {
                    var kind = b.getAttribute('data-detail-filter');
                    var val = b.getAttribute('data-value');
                    if (kind === 'op') {
                        var sel = document.getElementById('filterOp');
                        if (!Array.prototype.some.call(sel.options, function(o) { return o.value === val; })) {
                            var opt = document.createElement('option'); opt.value = val; opt.textContent = val; sel.appendChild(opt);
                        }
                        sel.value = val;
                    } else {
                        document.getElementById('filterSearch').value = val;
                    }
                    closeDetail();
                    loadActivity();
                });
            });
            var copyBtn = actionsEl.querySelector('[data-detail-copy]');
            if (copyBtn) copyBtn.addEventListener('click', function() {
                var text = JSON.stringify(entry, null, 2);
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(function() { if (CertMate.toast) CertMate.toast('Entry copied as JSON', 'success'); });
                }
            });

            _lastFocus = document.activeElement;
            var modal = document.getElementById('activityDetailModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            CertMate.lockScroll();
            var closeBtn = modal.querySelector('button[aria-label="Close"]');
            if (closeBtn) closeBtn.focus();
        };

        window.closeDetail = function() {
            var modal = document.getElementById('activityDetailModal');
            if (modal.classList.contains('hidden')) return;  // already closed — don't double-unlock
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            CertMate.unlockScroll();
            if (_lastFocus && _lastFocus.focus) _lastFocus.focus();
        };
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                var modal = document.getElementById('activityDetailModal');
                if (modal && !modal.classList.contains('hidden')) { e.preventDefault(); closeDetail(); }
            }
        });

        // Changing any filter resets pagination — otherwise a filter change
        // after several "Load more" clicks re-fetches at the inflated limit.
        function reloadFromFilters() {
            currentLimit = ACTIVITY_INITIAL_LIMIT;
            loadActivity();
        }
        window.clearActivityFilters = function() {
            document.getElementById('filterOp').value = '';
            document.getElementById('filterDate').value = '';
            document.getElementById('filterSearch').value = '';
            reloadFromFilters();
        };
        document.getElementById('filterOp').addEventListener('change', reloadFromFilters);
        document.getElementById('filterDate').addEventListener('change', reloadFromFilters);
        // Debounce search-as-you-type so we don't refetch on every keystroke.
        var searchDebounce;
        document.getElementById('filterSearch').addEventListener('input', function() {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(reloadFromFilters, 250);
        });
        loadActivity();
    })();
    </script>
{% endblock %}
