<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CertMate{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#3b82f6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0b1120" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="/static/manifest.json">
    <link href="/static/css/tailwind.min.css" rel="stylesheet">
    <link href="/static/css/fontawesome.min.css" rel="stylesheet">
    <style>
        /* Reserve the scrollbar gutter always, so navigating between
           pages or settings sub-tabs of different heights doesn't shift
           the whole layout horizontally by ~15px when the scrollbar
           appears or disappears. Supported in Chrome 94+, Firefox 97+,
           Safari 16+. The `overflow-y: scroll` fallback covers older
           Safari/iOS by forcing a permanent scrollbar in the same gutter. */
        html { scrollbar-gutter: stable; overflow-y: scroll; }
    </style>
    {% block head %}{% endblock %}
    <script>
    // Apply dark mode before paint to prevent flash
    (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || (theme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    })();
    </script>
</head>
<body class="bg-background min-h-screen pb-16 md:pb-0 transition-colors duration-200 font-sans">
    <!-- Skip-to-content link for keyboard users. Invisible until focused,
         then floats above the nav with a high-contrast pill so the
         destination is obvious. Targets #main-content on the <main>
         landmark below. -->
    <a href="#main-content"
       class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-[100] focus:px-3 focus:py-2 focus:bg-primary focus:text-white focus:rounded-md focus:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
        Skip to main content
    </a>
    <!-- Top Navigation -->
    <nav class="bg-surface shadow-card border-b border-gray-200/60 dark:border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14 md:h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <a href="/">
                            <img src="/static/img/certmate_logo_256.png" alt="CertMate" class="w-12 h-12 md:w-16 md:h-16">
                        </a>
                    </div>
                    <div class="ml-2 md:ml-3">
                        <h1 class="text-lg md:text-xl font-semibold text-foreground">CertMate</h1>
                        <p class="text-xs md:text-sm text-muted hidden sm:block">SSL Certificate Manager</p>
                    </div>
                </div>
                <div class="flex items-center space-x-1 sm:space-x-4">
                    <!-- Search (Cmd+K) — first item in the cluster. Desktop shows a
                         labelled pill; mobile a compact icon. Same keydown dispatch
                         feeds the existing command palette. -->
                    <button type="button" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'k',metaKey:true}))" class="hidden sm:inline-flex items-center px-2.5 py-1.5 text-sm text-gray-400 bg-surface-2 border-border border rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition" title="Search (Cmd+K)" aria-label="Open search">
                        <i class="fas fa-search mr-1.5 text-xs"></i>
                        <span class="text-xs">Search</span>
                        <kbd class="ml-2 px-1.5 py-0.5 text-[10px] bg-surface border-border rounded border">&#8984;K</kbd>
                    </button>
                    <button type="button" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'k',metaKey:true}))" class="sm:hidden px-2 py-2 rounded-md text-muted hover:bg-hover" title="Search" aria-label="Open search">
                        <i class="fas fa-search"></i>
                    </button>
                    <!-- Divider between Search and the icon nav -->
                    <span class="hidden md:block w-px h-5 bg-border" aria-hidden="true"></span>
                    <!-- Primary operations — icon-only on desktop (label via tooltip +
                         aria-label); on mobile they live in the bottom tab bar. -->
                    <a href="/" {% if request.path == '/' %}aria-current="page"{% endif %} class="hidden md:inline-flex items-center px-2 py-2 rounded-md hover:bg-hover {% if request.path == '/' %}text-primary{% else %}text-muted{% endif %}" title="Certificates" aria-label="Certificates">
                        <i class="fas fa-certificate"></i>
                    </a>
                    <a href="/activity" {% if request.path == '/activity' %}aria-current="page"{% endif %} class="hidden md:inline-flex items-center px-2 py-2 rounded-md hover:bg-hover {% if request.path == '/activity' %}text-primary{% else %}text-muted{% endif %}" title="Activity" aria-label="Activity">
                        <i class="fas fa-history"></i>
                    </a>
                    <!-- Divider between primary operations and utility icons -->
                    <span class="hidden md:block w-px h-5 bg-border" aria-hidden="true"></span>
                    <!-- Utility icons: Settings · API Docs · Help. Icon-only on
                         desktop; on mobile these live in the bottom tab bar. -->
                    <a href="/settings" {% if request.path == '/settings' %}aria-current="page"{% endif %} class="hidden md:inline-flex items-center px-2 py-2 rounded-md hover:bg-hover {% if request.path == '/settings' %}text-primary{% else %}text-muted{% endif %}" title="Settings" aria-label="Settings">
                        <i class="fas fa-cog"></i>
                    </a>
                    <a href="/redoc" target="_blank" rel="noopener" class="hidden md:inline-flex items-center px-2 py-2 rounded-md hover:bg-hover text-muted" title="API Docs (opens in a new tab)" aria-label="API Docs (opens in a new tab)">
                        <i class="fas fa-code"></i>
                    </a>
                    <a href="/help" {% if request.path == '/help' %}aria-current="page"{% endif %} class="hidden md:inline-flex items-center px-2 py-2 rounded-md hover:bg-hover {% if request.path == '/help' %}text-primary{% else %}text-muted{% endif %}" title="Help" aria-label="Help">
                        <i class="fas fa-question-circle"></i>
                    </a>
                    <!-- Keyboard shortcuts hint -->
                    <button type="button" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'?'}))" class="hidden sm:inline-flex items-center px-2 py-1.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-hover rounded-lg transition" title="Keyboard shortcuts (?)" aria-label="Show keyboard shortcuts">
                        <i class="fas fa-keyboard text-sm"></i>
                    </button>
                    <!-- Notification bell — links to the full /notifications
                         page (no dropdown). Badge shows the count of active
                         (non-snoozed) certificate warnings. -->
                    <a href="/notifications" {% if request.path == '/notifications' %}aria-current="page"{% endif %} id="notifBtn" class="px-2 py-2 rounded-md hover:bg-hover relative {% if request.path == '/notifications' %}text-primary{% else %}text-muted{% endif %}" title="Notifications" aria-label="Notifications">
                        <i class="fas fa-bell"></i>
                        <span id="notifBadge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center font-bold badge-pulse">0</span>
                    </a>
                    <!-- Theme is auto (follows OS) by default; override lives in
                         Settings → General → Appearance. No top-bar toggle. -->
                    <!-- Logout (rendered only when authenticated; gated
                         server-side via the `current_user` context var, so
                         the button no longer flashes in then out as the
                         old JS auth-check completed 500 ms after paint). -->
                    {% if current_user %}
                    <button type="button" id="logoutBtn" onclick="doLogout()" class="px-3 py-2 rounded-md text-sm font-medium text-danger-fg hover:bg-red-50 dark:hover:bg-red-900/30 border border-danger-line" title="Logout" aria-label="Log out">
                        <i class="fas fa-sign-out-alt mr-1"></i><span class="hidden sm:inline"> Logout</span>
                    </button>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Bottom Tab Bar (mobile only) -->
    <nav class="fixed bottom-0 left-0 right-0 md:hidden bg-surface border-t border-gray-200 dark:border-white/5 shadow-[0_-2px_10px_rgba(0,0,0,0.1)] z-40 safe-area-bottom" id="bottomTabBar">
        <div class="flex justify-around h-14">
            <a href="/" {% if request.path == '/' %}aria-current="page"{% endif %} class="flex flex-col items-center justify-center flex-1 py-1 transition-colors duration-150 {% if request.path == '/' %}text-primary{% else %}text-muted{% endif %}">
                <i class="fas fa-certificate text-lg"></i>
                <span class="text-xs mt-0.5 font-medium">Certs</span>
            </a>
            <a href="/settings" {% if request.path == '/settings' %}aria-current="page"{% endif %} class="flex flex-col items-center justify-center flex-1 py-1 transition-colors duration-150 {% if request.path == '/settings' %}text-primary{% else %}text-muted{% endif %}">
                <i class="fas fa-cog text-lg"></i>
                <span class="text-xs mt-0.5 font-medium">Settings</span>
            </a>
            <a href="/help" {% if request.path == '/help' %}aria-current="page"{% endif %} class="flex flex-col items-center justify-center flex-1 py-1 transition-colors duration-150 {% if request.path == '/help' %}text-primary{% else %}text-muted{% endif %}">
                <i class="fas fa-question-circle text-lg"></i>
                <span class="text-xs mt-0.5 font-medium">Help</span>
            </a>
            <a href="/activity" {% if request.path == '/activity' %}aria-current="page"{% endif %} class="flex flex-col items-center justify-center flex-1 py-1 transition-colors duration-150 {% if request.path == '/activity' %}text-primary{% else %}text-muted{% endif %}">
                <i class="fas fa-history text-lg"></i>
                <span class="text-xs mt-0.5 font-medium">Activity</span>
            </a>
            <a href="/redoc" target="_blank" rel="noopener" class="flex flex-col items-center justify-center flex-1 py-1 transition-colors duration-150 text-muted">
                <i class="fas fa-code text-lg"></i>
                <span class="text-xs mt-0.5 font-medium">API</span>
            </a>
        </div>
    </nav>
    <script>
    // Logout visibility is now gated server-side via the `current_user`
    // Jinja context var, so the deferred /api/auth/me probe is no longer
    // needed — the button either renders or it doesn't, no layout shift.
    function doLogout(){
        fetch('/api/auth/logout',{method:'POST',credentials:'same-origin'})
            .then(function(){window.location.href='/login'})
            .catch(function(){window.location.href='/login'});
    }
    // Theme preference is tri-state: 'auto' (no stored key — follows the OS
    // prefers-color-scheme), 'light', or 'dark'. The pre-paint bootstrap in
    // <head> resolves the same way. There is no top-bar toggle; the override
    // lives in Settings → General → Appearance via data-theme-option buttons.
    function _themeResolvesDark(){
        var theme = localStorage.getItem('theme');
        return theme === 'dark' ||
            (theme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
    }
    function _applyResolvedTheme(){
        document.documentElement.classList.toggle('dark', _themeResolvesDark());
        _syncThemeControls();
    }
    // Reflect the active preference onto any rendered segmented control. Uses
    // aria-pressed so the Tailwind `aria-pressed:` variant drives styling and
    // screen readers announce the selected option.
    function _syncThemeControls(){
        var current = localStorage.getItem('theme') || 'auto';
        document.querySelectorAll('[data-theme-option]').forEach(function(el){
            el.setAttribute('aria-pressed', el.getAttribute('data-theme-option') === current ? 'true' : 'false');
        });
    }
    function setTheme(mode){
        if (mode === 'auto') { localStorage.removeItem('theme'); }
        else { localStorage.setItem('theme', mode); }
        _applyResolvedTheme();
    }
    // When in Auto, react live to the OS switching light/dark.
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(){
        if (!localStorage.getItem('theme')) _applyResolvedTheme();
    });
    // Keep the keyboard shortcut (shortcuts.js) working — flip to the
    // opposite explicit theme from whatever is currently resolved.
    function toggleTheme(){ setTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark'); }
    document.addEventListener('DOMContentLoaded', _syncThemeControls);
    // Notifications — the bell links to /notifications; here we only keep the
    // unread badge in sync. Warnings are derived from /api/certificates (the
    // same data the page renders) and a domain can be snoozed client-side, in
    // which case it drops out of both the badge count and the page's active
    // list until the snooze expires. CertMateNotif is the single source of
    // truth for severity thresholds and snooze state, shared with the page.
    var CertMateNotif = (function() {
        var SNOOZE_KEY = 'cm_notif_snooze';
        function readSnooze() {
            try {
                var m = JSON.parse(localStorage.getItem(SNOOZE_KEY) || '{}');
                return (m && typeof m === 'object') ? m : {};
            } catch (e) { return {}; }
        }
        function writeSnooze(m) {
            try { localStorage.setItem(SNOOZE_KEY, JSON.stringify(m)); } catch (e) {}
        }
        // Drop expired snoozes on every read so the store self-cleans.
        function activeSnooze() {
            var m = readSnooze(), now = Date.now(), changed = false, out = {};
            Object.keys(m).forEach(function(d) {
                if (typeof m[d] === 'number' && m[d] > now) { out[d] = m[d]; }
                else { changed = true; }
            });
            if (changed) writeSnooze(out);
            return out;
        }
        return {
            isSnoozed: function(domain) { return !!activeSnooze()[domain]; },
            snoozedUntil: function(domain) { return activeSnooze()[domain] || null; },
            snooze: function(domain, ms) { var m = activeSnooze(); m[domain] = Date.now() + ms; writeSnooze(m); },
            unsnooze: function(domain) { var m = activeSnooze(); delete m[domain]; writeSnooze(m); },
            // Map a cert list to severity-classified warnings, most urgent first.
            deriveWarnings: function(certs) {
                if (!Array.isArray(certs)) return [];
                var out = [];
                certs.forEach(function(c) {
                    if (!c.exists) return;
                    var days = c.days_until_expiry;
                    if (days === null || days === undefined) return;
                    var type = null;
                    if (days <= 0) type = 'expired';
                    else if (days <= 7) type = 'critical';
                    else if (days <= 30) type = 'warning';
                    if (type) out.push({ domain: c.domain, days: days, type: type, expiry_date: c.expiry_date });
                });
                out.sort(function(a, b) { return a.days - b.days; });
                return out;
            }
        };
    })();
    window.CertMateNotif = CertMateNotif;

    function _updateNotifBadge(certs) {
        var badge = document.getElementById('notifBadge');
        if (!badge) return;
        var active = CertMateNotif.deriveWarnings(certs).filter(function(w) {
            return !CertMateNotif.isSnoozed(w.domain);
        });
        if (active.length === 0) { badge.classList.add('hidden'); return; }
        badge.textContent = active.length > 9 ? '9+' : active.length;
        badge.classList.remove('hidden');
    }
    function checkNotifications(force) {
        // Use cached data if fresh (< 60s) to avoid extra API calls
        if (!force) {
            try {
                var cached = JSON.parse(sessionStorage.getItem('cm_notif') || '{}');
                if (cached.t && (Date.now() - cached.t) < 60000) {
                    _updateNotifBadge(cached.d);
                    return;
                }
            } catch(e){}
        }
        fetch('/api/certificates', {credentials: 'same-origin'})
            .then(function(r) { return r.ok ? r.json() : []; })
            .then(function(certs) {
                try { sessionStorage.setItem('cm_notif', JSON.stringify({t: Date.now(), d: certs})); } catch(e){}
                _updateNotifBadge(certs);
            })
            .catch(function() {});
    }
    // Check on load (with cache, staggered after auth) and refresh every 5 min
    setTimeout(checkNotifications, 4000);
    setInterval(function() { checkNotifications(true); }, 300000);
    // Re-sync when returning to the tab — a snooze set on the notifications
    // page should shrink the badge as soon as you switch back.
    window.addEventListener('focus', function() { checkNotifications(false); });

    // SSE real-time updates
    (function() {
        if (typeof EventSource === 'undefined') return;
        var sse = null;
        var retryDelay = 1000;
        // Stop reconnecting after this many consecutive failures so a tab
        // that logged out (or that lost network indefinitely) doesn't keep
        // firing a 401 every 30s forever. With exponential backoff the
        // sequence is 1, 2, 4, 8, 16, 30, 30, 30, 30, 30 = ~3 minutes
        // before giving up. A page refresh restarts the connection.
        var consecutiveFailures = 0;
        var MAX_SSE_RETRIES = 10;

        function connectSSE() {
            sse = new EventSource('/api/events/stream');
            sse.onopen = function() {
                retryDelay = 1000;
                consecutiveFailures = 0;
            };
            sse.addEventListener('certificate_created', function(e) {
                try {
                    var d = JSON.parse(e.data);
                    CertMate.toast('Certificate created: ' + (d.domain || ''), 'success');
                    checkNotifications(true);
                    if (typeof loadCertificates === 'function') loadCertificates();
                } catch(err) {}
            });
            sse.addEventListener('certificate_renewed', function(e) {
                try {
                    var d = JSON.parse(e.data);
                    CertMate.toast('Certificate renewed: ' + (d.domain || ''), 'success');
                    checkNotifications(true);
                    if (typeof loadCertificates === 'function') loadCertificates();
                } catch(err) {}
            });
            sse.addEventListener('certificate_revoked', function(e) {
                try {
                    var d = JSON.parse(e.data);
                    CertMate.toast('Certificate revoked: ' + (d.domain || ''), 'warning');
                    checkNotifications(true);
                } catch(err) {}
            });
            sse.addEventListener('settings_updated', function() {
                CertMate.toast('Settings updated', 'info');
            });
            sse.onerror = function() {
                sse.close();
                consecutiveFailures++;
                if (consecutiveFailures >= MAX_SSE_RETRIES) {
                    // Stop hammering the server. A logged-out session would
                    // otherwise produce one 401 every 30s for the lifetime of
                    // the open tab. Page refresh resets the counter.
                    console.warn('CertMate SSE: stopping after ' + MAX_SSE_RETRIES +
                                 ' consecutive failures. Refresh the page to retry.');
                    return;
                }
                setTimeout(connectSSE, Math.min(retryDelay, 30000));
                retryDelay *= 2;
            };
        }

        // Delay SSE to avoid thread starvation (1 worker + 4 threads)
        // SSE holds a thread permanently; connect after page is interactive
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(connectSSE, 5000);
        });
    })();
    </script>
    <script defer src="/static/js/alpine.min.js"></script>
    <script>
    // Alpine load-failure fallback. `defer`-loaded scripts run before
    // DOMContentLoaded; if `window.Alpine` still isn't defined by then,
    // the bundle failed (network, parse error on an ancient browser,
    // resource blocked by an aggressive content filter). Surface a
    // visible banner so the user understands why tabs/dropdowns/
    // toggles aren't responding, instead of staring at a quietly
    // broken UI.
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof window.Alpine === 'undefined') {
            var banner = document.createElement('div');
            banner.setAttribute('role', 'alert');
            banner.className = 'fixed top-0 left-0 right-0 z-[200] bg-red-600 text-white text-sm px-4 py-2 text-center shadow-lg';
            banner.innerHTML =
                '<i class="fas fa-exclamation-triangle mr-2" aria-hidden="true"></i>' +
                'Interactive UI failed to load (Alpine.js missing). ' +
                'Some tabs, dropdowns, and toggles won\'t work — try refreshing the page, ' +
                'or check the browser console for blocked-resource errors.';
            document.body.insertBefore(banner, document.body.firstChild);
        }
    });
    </script>
    <script src="/static/js/certmate.js"></script>
    <!-- Provider brand icons: exposes window.providerIconHtml + enhances any
         DNS-provider radio grid. Loaded globally so the dashboard table and
         the certificate detail modal can render provider logos too, not just
         the Settings page. -->
    <script src="/static/js/provider-icons.js"></script>
    <script defer src="/static/js/report-issue.js"></script>
    <script defer src="/static/js/cmd-palette.js"></script>
    <script defer src="/static/js/shortcuts.js"></script>
    <script defer src="/static/js/setup-wizard.js"></script>

    <main id="main-content" tabindex="-1" class="page-enter">
    {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
