<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CertMate{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#3b82f6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0b1120" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="/static/manifest.json">
    <link href="/static/css/tailwind.min.css" rel="stylesheet">
    <link href="/static/css/fontawesome.min.css" rel="stylesheet">
    <style>
        /* Theme-toggle icon visibility keyed off the `dark` class on
           <html>. ID-selector specificity (100) beats FontAwesome's
           `.fas { display: inline-block }` (10), so this works without
           !important. Loaded in <head> after both stylesheets so the
           initial paint already has the right icon — no FOUC, no JS
           sync needed beyond the existing classList.toggle('dark'). */
        html:not(.dark) #theme-icon-sun { display: none; }
        html.dark #theme-icon-moon { display: none; }
    </style>
    {% block head %}{% endblock %}
    <script>
    // Apply dark mode before paint to prevent flash
    (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || (theme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    })();
    </script>
</head>
<body class="bg-surface-light dark:bg-surface-dark min-h-screen pb-16 md:pb-0 transition-colors duration-200 font-sans">
    <!-- Skip-to-content link for keyboard users. Invisible until focused,
         then floats above the nav with a high-contrast pill so the
         destination is obvious. Targets #main-content on the <main>
         landmark below. -->
    <a href="#main-content"
       class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-[100] focus:px-3 focus:py-2 focus:bg-primary focus:text-white focus:rounded-md focus:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
        Skip to main content
    </a>
    <!-- Top Navigation -->
    <nav class="bg-white dark:bg-surface-card shadow-card border-b border-gray-200/60 dark:border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14 md:h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <a href="/">
                            <img src="/static/img/certmate_logo_256.png" alt="CertMate" class="w-9 h-9 md:w-12 md:h-12">
                        </a>
                    </div>
                    <div class="ml-2 md:ml-3">
                        <h1 class="text-lg md:text-xl font-semibold text-gray-900 dark:text-white">CertMate</h1>
                        <p class="text-xs md:text-sm text-gray-500 dark:text-gray-400 hidden sm:block">SSL Certificate Manager</p>
                    </div>
                </div>
                <div class="flex items-center space-x-1 sm:space-x-4">
                    <!-- Desktop nav links (hidden on mobile — bottom tab bar used instead) -->
                    <a href="/" {% if request.path == '/' %}aria-current="page"{% endif %} class="hidden md:inline-flex items-center px-3 py-2 text-sm {% if request.path == '/' %}nav-active{% else %}nav-inactive{% endif %}">
                        <i class="fas fa-certificate mr-1.5 text-[0.85em] leading-none -translate-y-px"></i> Certificates
                    </a>

                    <a href="/settings" {% if request.path == '/settings' %}aria-current="page"{% endif %} class="hidden md:inline-flex items-center px-3 py-2 text-sm {% if request.path == '/settings' %}nav-active{% else %}nav-inactive{% endif %}">
                        <i class="fas fa-cog mr-1.5 text-[0.85em] leading-none -translate-y-px"></i> Settings
                    </a>
                    <a href="/help" {% if request.path == '/help' %}aria-current="page"{% endif %} class="hidden md:inline-flex items-center px-3 py-2 text-sm {% if request.path == '/help' %}nav-active{% else %}nav-inactive{% endif %}">
                        <i class="fas fa-question-circle mr-1.5 text-[0.85em] leading-none -translate-y-px"></i> Help
                    </a>
                    <a href="/activity" {% if request.path == '/activity' %}aria-current="page"{% endif %} class="hidden md:inline-flex items-center px-3 py-2 text-sm {% if request.path == '/activity' %}nav-active{% else %}nav-inactive{% endif %}">
                        <i class="fas fa-history mr-1.5 text-[0.85em] leading-none -translate-y-px"></i> Activity
                    </a>
                    <a href="/redoc" {% if request.path == '/redoc' %}aria-current="page"{% endif %} class="hidden md:inline-flex items-center px-3 py-2 text-sm {% if request.path == '/redoc' %}nav-active{% else %}nav-inactive{% endif %}">
                        <i class="fas fa-code mr-1.5 text-[0.85em] leading-none -translate-y-px"></i> API Docs
                    </a>
                    <!-- Search (Cmd+K) — desktop variant with visible label + kbd hint -->
                    <button type="button" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'k',metaKey:true}))" class="hidden sm:inline-flex items-center px-2.5 py-1.5 text-sm text-gray-400 bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition" title="Search (Cmd+K)" aria-label="Open search">
                        <i class="fas fa-search mr-1.5 text-xs"></i>
                        <span class="text-xs">Search</span>
                        <kbd class="ml-2 px-1.5 py-0.5 text-[10px] bg-white dark:bg-gray-800 rounded border border-gray-300 dark:border-gray-500">&#8984;K</kbd>
                    </button>
                    <!-- Search — compact icon-only mobile variant. Same keydown dispatch
                         so the existing Cmd+K command palette handler picks it up. -->
                    <button type="button" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'k',metaKey:true}))" class="sm:hidden px-2 py-2 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700" title="Search" aria-label="Open search">
                        <i class="fas fa-search"></i>
                    </button>
                    <!-- Keyboard shortcuts hint -->
                    <button type="button" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'?'}))" class="hidden sm:inline-flex items-center px-2 py-1.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition" title="Keyboard shortcuts (?)" aria-label="Show keyboard shortcuts">
                        <i class="fas fa-keyboard text-sm"></i>
                    </button>
                    <!-- Notification bell -->
                    <div class="relative">
                        <button type="button" id="notifBtn" onclick="toggleNotifications()" class="px-2 py-2 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 relative" title="Notifications" aria-label="Open notifications" aria-haspopup="true" aria-expanded="false" aria-controls="notifPanel">
                            <i class="fas fa-bell"></i>
                            <span id="notifBadge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center font-bold badge-pulse">0</span>
                        </button>
                        <div id="notifPanel" role="region" aria-label="Notifications" class="hidden absolute right-0 mt-2 w-[calc(100vw-2rem)] max-w-sm md:w-80 bg-white dark:bg-gray-800 rounded-lg shadow-xl border border-gray-200 dark:border-gray-700 z-50 max-h-96 overflow-y-auto">
                            <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700">
                                <h3 class="text-sm font-semibold text-gray-900 dark:text-white">Notifications</h3>
                            </div>
                            <div id="notifList" class="py-2">
                                <p class="px-4 py-3 text-sm text-gray-500 dark:text-gray-400">No notifications</p>
                            </div>
                        </div>
                    </div>
                    <!-- Dark mode toggle -->
                    <button type="button" id="themeToggle" onclick="toggleTheme()" class="px-2 py-2 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700" title="Toggle theme" aria-label="Toggle dark mode">
                        <i class="fas fa-moon" id="theme-icon-moon"></i>
                        <i class="fas fa-sun" id="theme-icon-sun"></i>
                    </button>
                    <!-- Logout (rendered only when authenticated; gated
                         server-side via the `current_user` context var, so
                         the button no longer flashes in then out as the
                         old JS auth-check completed 500 ms after paint). -->
                    {% if current_user %}
                    <button type="button" id="logoutBtn" onclick="doLogout()" class="px-3 py-2 rounded-md text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 border border-red-200 dark:border-red-700" title="Logout" aria-label="Log out">
                        <i class="fas fa-sign-out-alt mr-1"></i><span class="hidden sm:inline"> Logout</span>
                    </button>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Bottom Tab Bar (mobile only) -->
    <nav class="fixed bottom-0 left-0 right-0 md:hidden bg-white dark:bg-surface-card border-t border-gray-200 dark:border-white/5 shadow-[0_-2px_10px_rgba(0,0,0,0.1)] z-40 safe-area-bottom" id="bottomTabBar">
        <div class="flex justify-around h-14">
            <a href="/" {% if request.path == '/' %}aria-current="page"{% endif %} class="flex flex-col items-center justify-center flex-1 py-1 transition-colors duration-150 {% if request.path == '/' %}text-primary{% else %}text-gray-500 dark:text-gray-400{% endif %}">
                <i class="fas fa-certificate text-lg"></i>
                <span class="text-xs mt-0.5 font-medium">Certs</span>
            </a>
            <a href="/settings" {% if request.path == '/settings' %}aria-current="page"{% endif %} class="flex flex-col items-center justify-center flex-1 py-1 transition-colors duration-150 {% if request.path == '/settings' %}text-primary{% else %}text-gray-500 dark:text-gray-400{% endif %}">
                <i class="fas fa-cog text-lg"></i>
                <span class="text-xs mt-0.5 font-medium">Settings</span>
            </a>
            <a href="/help" {% if request.path == '/help' %}aria-current="page"{% endif %} class="flex flex-col items-center justify-center flex-1 py-1 transition-colors duration-150 {% if request.path == '/help' %}text-primary{% else %}text-gray-500 dark:text-gray-400{% endif %}">
                <i class="fas fa-question-circle text-lg"></i>
                <span class="text-xs mt-0.5 font-medium">Help</span>
            </a>
            <a href="/activity" {% if request.path == '/activity' %}aria-current="page"{% endif %} class="flex flex-col items-center justify-center flex-1 py-1 transition-colors duration-150 {% if request.path == '/activity' %}text-primary{% else %}text-gray-500 dark:text-gray-400{% endif %}">
                <i class="fas fa-history text-lg"></i>
                <span class="text-xs mt-0.5 font-medium">Activity</span>
            </a>
        </div>
    </nav>
    <script>
    // Logout visibility is now gated server-side via the `current_user`
    // Jinja context var, so the deferred /api/auth/me probe is no longer
    // needed — the button either renders or it doesn't, no layout shift.
    function doLogout(){
        fetch('/api/auth/logout',{method:'POST',credentials:'same-origin'})
            .then(function(){window.location.href='/login'})
            .catch(function(){window.location.href='/login'});
    }
    // Theme toggle. Icon visibility is driven by CSS rules in <head>
    // that key off the `dark` class on <html>, so this function only
    // needs to flip the class and persist the choice.
    function toggleTheme(){
        var html = document.documentElement;
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            localStorage.setItem('theme', 'light');
        } else {
            html.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        }
    }
    // Notifications — disclosure popup (non-modal): aria-expanded flip on
    // the trigger, focus moves into the panel when opened, focus restored
    // to the trigger on close, Escape dismisses. No focus trap because
    // this is a disclosure / menu pattern, not a dialog — Tab should be
    // free to leave the panel (ARIA APG Disclosure pattern).
    var _notifOpen = false;
    function _closeNotifPanel(restoreFocus) {
        var panel = document.getElementById('notifPanel');
        var btn = document.getElementById('notifBtn');
        panel.classList.add('hidden');
        if (btn) btn.setAttribute('aria-expanded', 'false');
        _notifOpen = false;
        if (restoreFocus && btn) btn.focus();
    }
    function toggleNotifications() {
        var panel = document.getElementById('notifPanel');
        var btn = document.getElementById('notifBtn');
        _notifOpen = !_notifOpen;
        panel.classList.toggle('hidden', !_notifOpen);
        if (btn) btn.setAttribute('aria-expanded', _notifOpen ? 'true' : 'false');
        if (_notifOpen) {
            // Move focus into the panel so keyboard users land where they
            // can act on the contents (first notification link, or the
            // panel itself if empty).
            var first = panel.querySelector('a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"])');
            if (first) first.focus();
        }
    }
    document.addEventListener('click', function(e) {
        if (_notifOpen && !e.target.closest('#notifBtn') && !e.target.closest('#notifPanel')) {
            _closeNotifPanel(false);
        }
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && _notifOpen) {
            e.preventDefault();
            _closeNotifPanel(true);
        }
    });
    function renderNotifications(certs) {
        if (!Array.isArray(certs)) return;
        var warnings = [];
        certs.forEach(function(c) {
            if (!c.exists) return;
            var days = c.days_until_expiry;
            if (days !== null && days !== undefined) {
                if (days <= 0) {
                    warnings.push({domain: c.domain, days: days, type: 'expired'});
                } else if (days <= 7) {
                    warnings.push({domain: c.domain, days: days, type: 'critical'});
                } else if (days <= 30) {
                    warnings.push({domain: c.domain, days: days, type: 'warning'});
                }
            }
        });
        var badge = document.getElementById('notifBadge');
        var list = document.getElementById('notifList');
        if (warnings.length === 0) {
            badge.classList.add('hidden');
            list.innerHTML = '<p class="px-4 py-3 text-sm text-gray-500 dark:text-gray-400"><i class="fas fa-check-circle text-green-500 mr-2"></i>All certificates healthy</p>';
            return;
        }
        badge.textContent = warnings.length > 9 ? '9+' : warnings.length;
        badge.classList.remove('hidden');
        var html = '';
        warnings.sort(function(a, b) { return a.days - b.days; });
        warnings.forEach(function(w) {
            var icon, color, msg;
            if (w.type === 'expired') {
                icon = 'fa-times-circle'; color = 'text-red-500'; msg = 'Expired';
            } else if (w.type === 'critical') {
                icon = 'fa-exclamation-circle'; color = 'text-red-500'; msg = w.days + 'd left';
            } else {
                icon = 'fa-exclamation-triangle'; color = 'text-yellow-500'; msg = w.days + 'd left';
            }
            html += '<a href="/" class="block px-4 py-2 hover:bg-gray-50 dark:hover:bg-gray-700/50">' +
                '<div class="flex items-center gap-3">' +
                '<i class="fas ' + icon + ' ' + color + '"></i>' +
                '<div class="min-w-0 flex-1">' +
                '<p class="text-sm font-medium text-gray-900 dark:text-white truncate">' + CertMate.escapeHtml(w.domain) + '</p>' +
                '<p class="text-xs ' + color + '">' + msg + '</p>' +
                '</div></div></a>';
        });
        list.innerHTML = html;
        try { sessionStorage.setItem('cm_notif', JSON.stringify({t: Date.now(), d: certs})); } catch(e){}
    }
    function checkNotifications(force) {
        // Use cached data if fresh (< 60s) to avoid extra API calls
        if (!force) {
            try {
                var cached = JSON.parse(sessionStorage.getItem('cm_notif') || '{}');
                if (cached.t && (Date.now() - cached.t) < 60000) {
                    renderNotifications(cached.d);
                    return;
                }
            } catch(e){}
        }
        fetch('/api/certificates', {credentials: 'same-origin'})
            .then(function(r) { return r.ok ? r.json() : []; })
            .then(function(certs) { renderNotifications(certs); })
            .catch(function() {});
    }
    // Check on load (with cache, staggered after auth) and refresh every 5 min
    setTimeout(checkNotifications, 4000);
    setInterval(function() { checkNotifications(true); }, 300000);

    // SSE real-time updates
    (function() {
        if (typeof EventSource === 'undefined') return;
        var sse = null;
        var retryDelay = 1000;

        function connectSSE() {
            sse = new EventSource('/api/events/stream');
            sse.onopen = function() { retryDelay = 1000; };
            sse.addEventListener('certificate_created', function(e) {
                try {
                    var d = JSON.parse(e.data);
                    CertMate.toast('Certificate created: ' + (d.domain || ''), 'success');
                    checkNotifications(true);
                    if (typeof loadCertificates === 'function') loadCertificates();
                } catch(err) {}
            });
            sse.addEventListener('certificate_renewed', function(e) {
                try {
                    var d = JSON.parse(e.data);
                    CertMate.toast('Certificate renewed: ' + (d.domain || ''), 'success');
                    checkNotifications(true);
                    if (typeof loadCertificates === 'function') loadCertificates();
                } catch(err) {}
            });
            sse.addEventListener('certificate_revoked', function(e) {
                try {
                    var d = JSON.parse(e.data);
                    CertMate.toast('Certificate revoked: ' + (d.domain || ''), 'warning');
                    checkNotifications(true);
                } catch(err) {}
            });
            sse.addEventListener('settings_updated', function() {
                CertMate.toast('Settings updated', 'info');
            });
            sse.onerror = function() {
                sse.close();
                setTimeout(connectSSE, Math.min(retryDelay, 30000));
                retryDelay *= 2;
            };
        }

        // Delay SSE to avoid thread starvation (1 worker + 4 threads)
        // SSE holds a thread permanently; connect after page is interactive
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(connectSSE, 5000);
        });
    })();
    </script>
    <script defer src="/static/js/alpine.min.js"></script>
    <script>
    // Alpine load-failure fallback. `defer`-loaded scripts run before
    // DOMContentLoaded; if `window.Alpine` still isn't defined by then,
    // the bundle failed (network, parse error on an ancient browser,
    // resource blocked by an aggressive content filter). Surface a
    // visible banner so the user understands why tabs/dropdowns/
    // toggles aren't responding, instead of staring at a quietly
    // broken UI.
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof window.Alpine === 'undefined') {
            var banner = document.createElement('div');
            banner.setAttribute('role', 'alert');
            banner.className = 'fixed top-0 left-0 right-0 z-[200] bg-red-600 text-white text-sm px-4 py-2 text-center shadow-lg';
            banner.innerHTML =
                '<i class="fas fa-exclamation-triangle mr-2" aria-hidden="true"></i>' +
                'Interactive UI failed to load (Alpine.js missing). ' +
                'Some tabs, dropdowns, and toggles won\'t work — try refreshing the page, ' +
                'or check the browser console for blocked-resource errors.';
            document.body.insertBefore(banner, document.body.firstChild);
        }
    });
    </script>
    <script src="/static/js/certmate.js"></script>
    <script defer src="/static/js/report-issue.js"></script>
    <script defer src="/static/js/cmd-palette.js"></script>
    <script defer src="/static/js/shortcuts.js"></script>
    <script defer src="/static/js/setup-wizard.js"></script>

    <main id="main-content" tabindex="-1" class="page-enter">
    {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
