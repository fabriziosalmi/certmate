<!-- TAB: Deployment Probes -->
        <div x-show="tab === 'probe'" x-cloak
             class="bg-surface border-border rounded-lg shadow-sm border p-6 mt-6"
             x-data="probeManager()" x-init="loadCertificates()">

            <h3 class="text-lg font-semibold text-foreground flex items-center mb-6">
                <i class="fas fa-network-wired mr-2 text-primary"></i>
                Deployment Probes
            </h3>

            <p class="text-sm text-muted mb-6">
                Configure TCP/ TLS probes that periodically check whether your certificates
                are reachable on the network. Each probe targets a certificate's domain and
                verifies connectivity on a given port using the selected protocol.
            </p>

            <!-- Search -->
            <div class="relative mb-6">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" x-model="search" placeholder="Filter domains…"
                       class="w-full pl-10 pr-4 py-2 text-sm border border-border rounded-lg bg-input text-foreground focus:ring-2 focus:ring-primary focus:border-primary outline-none">
            </div>

            <!-- Configured probes -->
            <div class="border border-border rounded-lg mb-6">
                <div class="flex items-center justify-between px-4 py-3 bg-gray-50 dark:bg-gray-700/30">
                    <span class="font-medium text-foreground text-sm">
                        <i class="fas fa-check-circle mr-2 text-green-500"></i>Configured Probes
                        <span class="text-gray-400 font-normal ml-1" x-text="'(' + configured.length + ')'"></span>
                    </span>
                </div>
                <div class="p-4">
                    <template x-if="configured.length === 0">
                        <p class="text-center text-sm text-muted py-4">
                            <i class="fas fa-inbox mr-1"></i>No probes configured yet
                        </p>
                    </template>
                    <template x-if="filteredConfigured.length === 0 && configured.length > 0">
                        <p class="text-center text-sm text-muted py-4">
                            <i class="fas fa-filter mr-1"></i>No domains match your filter
                        </p>
                    </template>
                    <div class="space-y-2">
                        <template x-for="cert in filteredConfigured" :key="cert.domain">
                            <div class="flex items-center justify-between bg-gray-50 dark:bg-gray-700/30 rounded-lg px-4 py-3 border border-border">
                                <!-- Edit mode -->
                                <template x-if="editingDomain === cert.domain">
                                    <div class="flex-1 flex flex-wrap items-center gap-3">
                                        <span class="font-mono text-sm text-foreground font-medium" x-text="cert.domain"></span>
                                        <input type="number" x-model="editPort" placeholder="Port" min="1" max="65535"
                                               class="w-20 text-sm border border-border rounded px-2 py-1 bg-input text-foreground focus:ring-2 focus:ring-primary focus:border-primary outline-none flex-shrink-0"
                                               title="TCP port (empty for default)">
                                        <div class="relative flex-shrink-0" style="min-width:150px" @click.away="editProtoOpen = false">
                                            <button type="button" @click="editProtoOpen = !editProtoOpen"
                                                    class="w-full text-sm border border-border rounded px-2 py-1 bg-input text-foreground focus:ring-2 focus:ring-primary focus:border-primary outline-none flex items-center justify-between gap-1">
                                                <span x-text="protocolLabel(editProtocol) || 'HTTPS/TLS'"></span>
                                                <i class="fas fa-chevron-down text-[10px] transition-transform duration-150" :class="{'rotate-180': editProtoOpen}"></i>
                                            </button>
                                            <div x-show="editProtoOpen" x-transition:enter="transition ease-out duration-100" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" x-transition:leave="transition ease-in duration-75" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
                                                 class="absolute z-50 mt-1 w-full border border-border rounded-lg bg-input shadow-lg overflow-hidden">
                                                <template x-for="opt in ['https-tls', 'tls', 'smtp-starttls']" :key="opt">
                                                    <button type="button" @click="editProtocol = opt; editProtoOpen = false"
                                                            class="w-full text-left px-3 py-2 text-sm transition-colors duration-100"
                                                            :class="editProtocol === opt ? 'bg-hover text-foreground font-medium' : 'text-muted hover:bg-hover hover:text-foreground'">
                                                        <span x-text="protocolLabel(opt)"></span>
                                                    </button>
                                                </template>
                                            </div>
                                        </div>
                                         <button type="button" @click="saveEdit()"
                                                class="text-xs px-3 py-1.5 bg-green-600 text-white rounded hover:bg-green-700 transition">
                                            <i class="fas fa-save mr-1"></i>Save
                                        </button>
                                        <button type="button" @click="cancelEdit()"
                                                class="text-xs px-3 py-1.5 bg-surface-2 text-label rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                                            Cancel
                                        </button>
                                    </div>
                                </template>
                                <!-- Display mode -->
                                <template x-if="editingDomain !== cert.domain">
                                    <div class="flex-1 flex items-center justify-between">
                                        <div class="flex items-center gap-4">
                                            <span class="font-mono text-sm text-foreground font-medium" x-text="cert.domain"></span>
                                            <span class="text-xs bg-info-surface text-info-fg px-2 py-0.5 rounded-full"
                                                  x-text="protocolLabel(cert.deployment_protocol)"></span>
                                            <span x-show="cert.deployment_port"
                                                  class="text-xs bg-surface-2 text-label px-2 py-0.5 rounded-full font-mono"
                                                  x-text="'port ' + cert.deployment_port"></span>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <button type="button" @click="startEdit(cert)"
                                                    class="text-xs px-2 py-1 bg-info-surface text-info-fg rounded hover:bg-blue-200 dark:hover:bg-blue-900/50 transition"
                                                    title="Edit probe">
                                                <i class="fas fa-pen mr-1"></i>Edit
                                            </button>
                                            <button type="button" @click="removeProbe(cert.domain)"
                                                    class="text-xs px-2 py-1 bg-danger-surface text-danger-fg rounded hover:bg-red-200 dark:hover:bg-red-900/40 transition"
                                                    title="Remove probe">
                                                <i class="fas fa-trash-alt mr-1"></i>Remove
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Add new probe -->
            <div class="border border-border rounded-lg">
                <div class="flex items-center justify-between px-4 py-3 bg-gray-50 dark:bg-gray-700/30">
                    <span class="font-medium text-foreground text-sm">
                        <i class="fas fa-plus-circle mr-2 text-blue-500"></i>Add Probe
                    </span>
                </div>
                <div class="p-4">
                    <div class="flex flex-nowrap items-end gap-2">
                        <div class="flex-1 min-w-0">
                            <label class="block text-xs text-muted mb-1">Domain</label>
                            <input list="probe-domain-suggestions" type="text" x-model="addDomain" placeholder="example.com"
                                   class="w-full text-sm border border-border rounded px-3 py-2 bg-input text-foreground focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                            <datalist id="probe-domain-suggestions">
                                <template x-for="cert in unconfigured" :key="cert.domain">
                                    <option :value="cert.domain"></option>
                                </template>
                            </datalist>
                        </div>
                        <div class="flex-shrink-0">
                            <label class="block text-xs text-muted mb-1">Port</label>
                            <input type="number" x-model="addPort" placeholder="443" min="1" max="65535"
                                   class="w-20 text-sm border border-border rounded px-3 py-2 bg-input text-foreground focus:ring-2 focus:ring-primary focus:border-primary outline-none"
                                   title="TCP port (empty for default)">
                        </div>
                        <div class="flex-shrink-0">
                            <label class="block text-xs text-muted mb-1">Protocol</label>
                            <div class="relative" style="min-width:150px" @click.away="addProtoOpen = false">
                                <button type="button" @click="addProtoOpen = !addProtoOpen"
                                        class="w-full text-sm border border-border rounded px-3 py-2 bg-input text-foreground focus:ring-2 focus:ring-primary focus:border-primary outline-none flex items-center justify-between gap-1">
                                    <span x-text="protocolLabel(addProtocol) || 'HTTPS/TLS'"></span>
                                    <i class="fas fa-chevron-down text-[10px] transition-transform duration-150" :class="{'rotate-180': addProtoOpen}"></i>
                                </button>
                                <div x-show="addProtoOpen" x-transition:enter="transition ease-out duration-100" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" x-transition:leave="transition ease-in duration-75" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
                                     class="absolute z-50 mt-1 w-full border border-border rounded-lg bg-input shadow-lg overflow-hidden">
                                    <template x-for="opt in ['https-tls', 'tls', 'smtp-starttls']" :key="opt">
                                        <button type="button" @click="addProtocol = opt; addProtoOpen = false"
                                                class="w-full text-left px-3 py-2 text-sm transition-colors duration-100"
                                                :class="addProtocol === opt ? 'bg-hover text-foreground font-medium' : 'text-muted hover:bg-hover hover:text-foreground'">
                                            <span x-text="protocolLabel(opt)"></span>
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </div>
                          <div class="flex-shrink-0">
                              <label class="block text-xs text-muted mb-1 invisible">&nbsp;</label>
                              <button type="button" @click="addProbe()"
                                      class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700 transition whitespace-nowrap">
                                 <i class="fas fa-plus mr-1"></i>Add Probe
                             </button>
                         </div>
                    </div>
                </div>
            </div>
        </div>
