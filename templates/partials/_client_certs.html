<!-- Client Certificates Partial — included in index.html under "Client" tab -->

<!-- Statistics Bar -->
<!-- Compact single-row stat strip (redesign phase 5) — mirrors the server
     dashboard strip so the Server↔Client toggle keeps one card vocabulary. -->
<div class="grid grid-cols-4 gap-2 sm:gap-3 mb-6">
    <div class="relative overflow-hidden rounded-lg shadow-card hover:shadow-elevated transition-shadow duration-200 bg-surface">
        <span class="absolute inset-y-0 left-0 w-1 bg-blue-500" aria-hidden="true"></span>
        <div class="pl-3.5 pr-3 py-2">
            <div class="flex items-center gap-1.5">
                <i class="fas fa-certificate text-blue-500 text-xs flex-shrink-0"></i>
                <p class="text-[10px] font-semibold text-muted uppercase tracking-wider truncate">Total</p>
            </div>
            <p class="text-2xl font-bold text-foreground tabular-nums leading-none mt-1" id="totalCount">0</p>
            <p class="text-[10px] text-muted mt-0.5 truncate hidden sm:block">client certificates</p>
        </div>
    </div>
    <div class="relative overflow-hidden rounded-lg shadow-card hover:shadow-elevated transition-shadow duration-200 bg-surface">
        <span class="absolute inset-y-0 left-0 w-1 bg-green-500" aria-hidden="true"></span>
        <div class="pl-3.5 pr-3 py-2">
            <div class="flex items-center gap-1.5">
                <i class="fas fa-circle-check text-success-fg text-xs flex-shrink-0"></i>
                <p class="text-[10px] font-semibold text-muted uppercase tracking-wider truncate">Active</p>
            </div>
            <p class="text-2xl font-bold text-success-fg tabular-nums leading-none mt-1" id="activeCount">0</p>
            <p class="text-[10px] text-muted mt-0.5 truncate hidden sm:block">valid &amp; usable</p>
        </div>
    </div>
    <div class="relative overflow-hidden rounded-lg shadow-card hover:shadow-elevated transition-shadow duration-200 bg-surface">
        <span class="absolute inset-y-0 left-0 w-1 bg-red-500" aria-hidden="true"></span>
        <div class="pl-3.5 pr-3 py-2">
            <div class="flex items-center gap-1.5">
                <i class="fas fa-ban text-danger-fg text-xs flex-shrink-0"></i>
                <p class="text-[10px] font-semibold text-muted uppercase tracking-wider truncate">Revoked</p>
            </div>
            <p class="text-2xl font-bold text-danger-fg tabular-nums leading-none mt-1" id="revokedCount">0</p>
            <p class="text-[10px] text-muted mt-0.5 truncate hidden sm:block">no longer trusted</p>
        </div>
    </div>
    <div class="relative overflow-hidden rounded-lg shadow-card hover:shadow-elevated transition-shadow duration-200 bg-surface">
        <span class="absolute inset-y-0 left-0 w-1 bg-indigo-500" aria-hidden="true"></span>
        <div class="pl-3.5 pr-3 py-2">
            <div class="flex items-center gap-1.5">
                <i class="fas fa-chart-pie text-indigo-500 text-xs flex-shrink-0"></i>
                <p class="text-[10px] font-semibold text-muted uppercase tracking-wider truncate">By Usage</p>
            </div>
            <p class="text-xs font-medium text-foreground leading-none mt-1.5 truncate" id="usageBreakdown">—</p>
        </div>
    </div>
</div>

<!-- Certificates List -->
<div class="bg-surface border-border shadow-lg rounded-xl border overflow-hidden">
    <div class="px-6 py-5 border-b border-border bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-gray-800 dark:to-gray-700">
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
            <h3 class="text-xl font-bold text-foreground flex items-center">
                <i class="fas fa-list mr-2 text-primary"></i>
                Client Certificates
            </h3>
            <div class="flex flex-wrap items-center gap-2">
                <!-- Per-page CN/email search retired: the global ⌘K palette now
                     searches client certificates too. Usage/status filters stay. -->
                <select id="filterUsage" aria-label="Filter by usage type"
                        class="px-4 py-2 text-sm border text-foreground border-border rounded-lg bg-input focus:ring-2 focus:ring-primary focus:border-primary">
                    <option value="">All Usage Types</option>
                    <option value="api-mtls">API mTLS</option>
                    <option value="vpn">VPN</option>
                    <option value="user-auth">User Auth</option>
                </select>
                <select id="filterStatus" aria-label="Filter by status"
                        class="px-4 py-2 text-sm border text-foreground border-border rounded-lg bg-input focus:ring-2 focus:ring-primary focus:border-primary">
                    <option value="">All Status</option>
                    <option value="active">Active</option>
                    <option value="revoked">Revoked</option>
                </select>
            </div>
        </div>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full">
            <thead class="bg-surface-2 border-border border-b">
                <tr>
                    <th id="cc-sort-th-common_name" scope="col" aria-sort="none" class="px-6 py-3 text-left text-xs font-medium text-label uppercase tracking-wider">
                        <button type="button" onclick="ccSortCertificates('common_name')" class="inline-flex items-center uppercase tracking-wider hover:text-foreground focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset rounded">Common Name <i class="fas fa-sort ml-1 text-gray-400" id="cc-sort-icon-common_name" aria-hidden="true"></i></button>
                    </th>
                    <th id="cc-sort-th-email" scope="col" aria-sort="none" class="px-6 py-3 text-left text-xs font-medium text-label uppercase tracking-wider hidden md:table-cell">
                        <button type="button" onclick="ccSortCertificates('email')" class="inline-flex items-center uppercase tracking-wider hover:text-foreground focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset rounded">Email <i class="fas fa-sort ml-1 text-gray-400" id="cc-sort-icon-email" aria-hidden="true"></i></button>
                    </th>
                    <th id="cc-sort-th-cert_usage" scope="col" aria-sort="none" class="px-6 py-3 text-left text-xs font-medium text-label uppercase tracking-wider hidden lg:table-cell">
                        <button type="button" onclick="ccSortCertificates('cert_usage')" class="inline-flex items-center uppercase tracking-wider hover:text-foreground focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset rounded">Usage <i class="fas fa-sort ml-1 text-gray-400" id="cc-sort-icon-cert_usage" aria-hidden="true"></i></button>
                    </th>
                    <th id="cc-sort-th-created_at" scope="col" aria-sort="none" class="px-6 py-3 text-left text-xs font-medium text-label uppercase tracking-wider hidden lg:table-cell">
                        <button type="button" onclick="ccSortCertificates('created_at')" class="inline-flex items-center uppercase tracking-wider hover:text-foreground focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset rounded">Created <i class="fas fa-sort ml-1 text-gray-400" id="cc-sort-icon-created_at" aria-hidden="true"></i></button>
                    </th>
                    <th id="cc-sort-th-expires_at" scope="col" aria-sort="none" class="px-6 py-3 text-left text-xs font-medium text-label uppercase tracking-wider">
                        <button type="button" onclick="ccSortCertificates('expires_at')" class="inline-flex items-center uppercase tracking-wider hover:text-foreground focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset rounded">Expires <i class="fas fa-sort ml-1 text-gray-400" id="cc-sort-icon-expires_at" aria-hidden="true"></i></button>
                    </th>
                    <th id="cc-sort-th-status" scope="col" aria-sort="none" class="px-6 py-3 text-left text-xs font-medium text-label uppercase tracking-wider">
                        <button type="button" onclick="ccSortCertificates('status')" class="inline-flex items-center uppercase tracking-wider hover:text-foreground focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset rounded">Status <i class="fas fa-sort ml-1 text-gray-400" id="cc-sort-icon-status" aria-hidden="true"></i></button>
                    </th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-label uppercase tracking-wider">Actions</th>
                </tr>
            </thead>
            <tbody id="certTableBody" class="divide-y divide-gray-200 dark:divide-gray-700">
                <tr><td colspan="7" class="px-6 py-8 text-center text-muted">Loading certificates...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal for certificate details -->
<div id="certModal" class="hidden fixed inset-0 bg-gray-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 sm:p-6"
     role="dialog" aria-modal="true" aria-labelledby="certModalTitle" onclick="if (event.target === this) closeCertModal()">
    <div class="bg-surface rounded-2xl shadow-elevated w-full max-w-lg max-h-[90vh] flex flex-col overflow-hidden">
        <div class="flex-shrink-0 flex justify-between items-center gap-2 px-6 py-4 border-b border-gray-100 dark:border-white/5">
            <h3 id="certModalTitle" class="text-base font-semibold font-mono text-foreground whitespace-nowrap overflow-x-auto min-w-0">Certificate Details</h3>
            <button type="button" onclick="closeCertModal()" class="flex-shrink-0 text-gray-400 hover:text-foreground p-1 rounded-lg hover:bg-hover transition-colors" aria-label="Close dialog">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>
        <div id="modalContent" class="px-6 py-4 overflow-y-auto"></div>
        <div class="flex-shrink-0 flex flex-wrap gap-2 px-6 py-3 border-t border-border">
            <button type="button" onclick="downloadCertFile('crt')" aria-label="Download certificate file" class="btn btn-primary flex-1 min-w-[6rem]">
                <i class="fas fa-download mr-1.5"></i> .crt
            </button>
            <button type="button" onclick="downloadCertFile('key')" aria-label="Download private key file (keep secret)" title="Private key — keep it secret" class="btn btn-secondary flex-1 min-w-[6rem] text-warning-fg">
                <i class="fas fa-key mr-1.5"></i> .key
            </button>
            <button type="button" onclick="downloadCertFile('csr')" aria-label="Download CSR file" class="btn btn-secondary flex-1 min-w-[6rem]">
                <i class="fas fa-download mr-1.5"></i> .csr
            </button>
        </div>
    </div>
</div>
