<!-- Client Certificates Partial — included in index.html under "Client" tab -->

<!-- Stat counters moved up to share the toggle's row (top of index.html);
     ccLoadStatistics() fills #totalCount / #activeCount / #revokedCount there.
     "By Usage" was dropped to match the server's three-counter strip. -->

<!-- Certificates List -->
<div class="bg-surface shadow-card rounded-xl overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-100 dark:border-white/5">
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
            <h3 class="text-lg font-semibold text-foreground">Client Certificates</h3>
            <div class="flex flex-wrap items-center gap-2">
                <!-- Status + usage as chips (CN/email search lives in the ⌘K
                     palette) and an actions icon group — same vocabulary as the
                     server list header. Counts/filtering are driven by client-certs.js. -->
                <div class="inline-flex flex-wrap items-center gap-1 rounded-lg border border-border bg-surface-2 p-1" role="group" aria-label="Filter by status">
                    <button type="button" data-cc-status-chip="" aria-pressed="true" onclick="ccSetStatusFilter('')" class="cm-chip aria-pressed:bg-primary/15 aria-pressed:text-primary aria-pressed:ring-1 aria-pressed:ring-inset aria-pressed:ring-primary/30">All <span class="text-[10px] tabular-nums opacity-70" data-cc-status-count="all"></span></button>
                    <button type="button" data-cc-status-chip="active" aria-pressed="false" onclick="ccSetStatusFilter('active')" class="cm-chip aria-pressed:bg-green-500/15 aria-pressed:text-success-fg aria-pressed:ring-1 aria-pressed:ring-inset aria-pressed:ring-green-500/30">Active <span class="text-[10px] tabular-nums opacity-70" data-cc-status-count="active"></span></button>
                    <button type="button" data-cc-status-chip="revoked" aria-pressed="false" onclick="ccSetStatusFilter('revoked')" class="cm-chip aria-pressed:bg-red-500/15 aria-pressed:text-danger-fg aria-pressed:ring-1 aria-pressed:ring-inset aria-pressed:ring-red-500/30">Revoked <span class="text-[10px] tabular-nums opacity-70" data-cc-status-count="revoked"></span></button>
                </div>
                <div class="inline-flex flex-wrap items-center gap-1 rounded-lg border border-border bg-surface-2 p-1" role="group" aria-label="Filter by usage type">
                    <button type="button" data-cc-usage-chip="" aria-pressed="true" onclick="ccSetUsageFilter('')" class="cm-chip aria-pressed:bg-primary/15 aria-pressed:text-primary aria-pressed:ring-1 aria-pressed:ring-inset aria-pressed:ring-primary/30">All</button>
                    <button type="button" data-cc-usage-chip="api-mtls" aria-pressed="false" onclick="ccSetUsageFilter('api-mtls')" class="cm-chip aria-pressed:bg-primary/15 aria-pressed:text-primary aria-pressed:ring-1 aria-pressed:ring-inset aria-pressed:ring-primary/30">API mTLS</button>
                    <button type="button" data-cc-usage-chip="vpn" aria-pressed="false" onclick="ccSetUsageFilter('vpn')" class="cm-chip aria-pressed:bg-primary/15 aria-pressed:text-primary aria-pressed:ring-1 aria-pressed:ring-inset aria-pressed:ring-primary/30">VPN</button>
                    <button type="button" data-cc-usage-chip="user-auth" aria-pressed="false" onclick="ccSetUsageFilter('user-auth')" class="cm-chip aria-pressed:bg-primary/15 aria-pressed:text-primary aria-pressed:ring-1 aria-pressed:ring-inset aria-pressed:ring-primary/30">User Auth</button>
                </div>
                <div class="inline-flex items-center gap-1.5" role="group" aria-label="Client list actions">
                    <button type="button" onclick="ccRefresh()" class="cm-icon-btn" title="Refresh the list" aria-label="Refresh client certificate list"><i class="fas fa-arrows-rotate" aria-hidden="true"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-border">
            <thead class="bg-gray-50/80 dark:bg-gray-700/60 backdrop-blur-md sticky top-0 z-10">
                <tr>
                    <th id="cc-sort-th-common_name" scope="col" aria-sort="none" class="px-6 py-3 text-left text-xs font-medium text-muted uppercase tracking-wider">
                        <button type="button" onclick="ccSortCertificates('common_name')" class="inline-flex items-center uppercase tracking-wider hover:text-foreground focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset rounded">Common Name <i class="fas fa-sort ml-1 text-gray-400" id="cc-sort-icon-common_name" aria-hidden="true"></i></button>
                    </th>
                    <th id="cc-sort-th-email" scope="col" aria-sort="none" class="px-6 py-3 text-left text-xs font-medium text-muted uppercase tracking-wider hidden md:table-cell">
                        <button type="button" onclick="ccSortCertificates('email')" class="inline-flex items-center uppercase tracking-wider hover:text-foreground focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset rounded">Email <i class="fas fa-sort ml-1 text-gray-400" id="cc-sort-icon-email" aria-hidden="true"></i></button>
                    </th>
                    <th id="cc-sort-th-cert_usage" scope="col" aria-sort="none" class="px-6 py-3 text-left text-xs font-medium text-muted uppercase tracking-wider hidden lg:table-cell">
                        <button type="button" onclick="ccSortCertificates('cert_usage')" class="inline-flex items-center uppercase tracking-wider hover:text-foreground focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset rounded">Usage <i class="fas fa-sort ml-1 text-gray-400" id="cc-sort-icon-cert_usage" aria-hidden="true"></i></button>
                    </th>
                    <th id="cc-sort-th-created_at" scope="col" aria-sort="none" class="px-6 py-3 text-left text-xs font-medium text-muted uppercase tracking-wider hidden lg:table-cell">
                        <button type="button" onclick="ccSortCertificates('created_at')" class="inline-flex items-center uppercase tracking-wider hover:text-foreground focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset rounded">Created <i class="fas fa-sort ml-1 text-gray-400" id="cc-sort-icon-created_at" aria-hidden="true"></i></button>
                    </th>
                    <th id="cc-sort-th-expires_at" scope="col" aria-sort="none" class="px-6 py-3 text-left text-xs font-medium text-muted uppercase tracking-wider">
                        <button type="button" onclick="ccSortCertificates('expires_at')" class="inline-flex items-center uppercase tracking-wider hover:text-foreground focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset rounded">Expires <i class="fas fa-sort ml-1 text-gray-400" id="cc-sort-icon-expires_at" aria-hidden="true"></i></button>
                    </th>
                    <th id="cc-sort-th-status" scope="col" aria-sort="none" class="px-6 py-3 text-left text-xs font-medium text-muted uppercase tracking-wider">
                        <button type="button" onclick="ccSortCertificates('status')" class="inline-flex items-center uppercase tracking-wider hover:text-foreground focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset rounded">Status <i class="fas fa-sort ml-1 text-gray-400" id="cc-sort-icon-status" aria-hidden="true"></i></button>
                    </th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-muted uppercase tracking-wider">Actions</th>
                </tr>
            </thead>
            <tbody id="certTableBody" class="divide-y divide-border">
                <tr><td colspan="7" class="px-6 py-8 text-center text-muted">Loading certificates...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal for certificate details -->
<div id="certModal" class="hidden fixed inset-0 bg-gray-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 sm:p-6"
     role="dialog" aria-modal="true" aria-labelledby="certModalTitle" onclick="if (event.target === this) closeCertModal()">
    <div class="bg-surface rounded-2xl shadow-elevated w-full max-w-lg max-h-[90vh] flex flex-col overflow-hidden">
        <div class="flex-shrink-0 flex justify-between items-center gap-2 px-6 py-4 border-b border-gray-100 dark:border-white/5">
            <h3 id="certModalTitle" class="text-base font-semibold font-mono text-foreground whitespace-nowrap overflow-x-auto min-w-0">Certificate Details</h3>
            <button type="button" onclick="closeCertModal()" class="flex-shrink-0 text-gray-400 hover:text-foreground p-1 rounded-lg hover:bg-hover transition-colors" aria-label="Close dialog">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>
        <div id="modalContent" class="px-6 py-4 overflow-y-auto"></div>
        <div class="flex-shrink-0 flex flex-wrap gap-2 px-6 py-3 border-t border-border">
            <button type="button" onclick="downloadCertFile('crt')" aria-label="Download certificate file" class="btn btn-primary flex-1 min-w-[6rem]">
                <i class="fas fa-download mr-1.5"></i> .crt
            </button>
            <button type="button" onclick="downloadCertFile('key')" aria-label="Download private key file (keep secret)" title="Private key — keep it secret" class="btn btn-secondary flex-1 min-w-[6rem] text-warning-fg">
                <i class="fas fa-key mr-1.5"></i> .key
            </button>
            <button type="button" onclick="downloadCertFile('csr')" aria-label="Download CSR file" class="btn btn-secondary flex-1 min-w-[6rem]">
                <i class="fas fa-download mr-1.5"></i> .csr
            </button>
        </div>
    </div>
</div>
