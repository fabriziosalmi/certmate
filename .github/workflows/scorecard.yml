name: OSSF Scorecard

on:
  # Re-run on default-branch pushes so the badge stays current after merges.
  push:
    branches: [ main ]
  # Weekly cron — Scorecard relies on this for the "Maintained" check.
  schedule:
    - cron: '23 4 * * 1'
  # Allow manual reruns from the Actions tab.
  workflow_dispatch:

# Default permissions are read-only. The analysis job below grants the
# narrower writes it actually needs — never spread these to the whole
# workflow.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Upload SARIF to GitHub code scanning.
      security-events: write
      # Mint OIDC token for publishing results to scorecard.dev.
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Read-only PAT so Scorecard can evaluate Branch-Protection: the
          # default GITHUB_TOKEN cannot read branch-protection settings, which
          # left that high-weight check scored "?". Fine-grained, scoped to
          # Administration: read + Contents: read.
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
          # Publish to scorecard.dev so the README badge renders the
          # live score. Requires the repo to be public (it is).
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v3
        with:
          sarif_file: results.sarif
